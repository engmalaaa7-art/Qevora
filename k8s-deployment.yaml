apiVersion: apps/v1
kind: Deployment
metadata:
  name: qevora-api
  labels:
    app: qevora-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qevora-api
  template:
    metadata:
      labels:
        app: qevora-api
    spec:
      containers:
        - name: qevora-api
          image: ghcr.io/engmalaaa7-art/qevora-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: qevora-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: qevora-api-svc
spec:
  type: ClusterIP
  selector:
    app: qevora-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
