<canvas id="shader-canvas-ANIMATION_30" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_30');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

void main() {
    vec2 uv = (v_texCoord - 0.5) * 2.0;
    uv.x *= u_resolution.x / u_resolution.y;
    
    // Core Orb
    float dist = length(uv);
    float orb = 0.3 / dist;
    
    // Pulsing and Swirling
    float swirl = sin(dist * 10.0 - u_time * 3.0);
    float glow = smoothstep(0.5, 0.0, dist) * (0.8 + 0.2 * sin(u_time * 2.0));
    
    // Brand Colors (Qevora Purple and Cyan)
    vec3 color1 = vec3(0.42, 0.30, 1.0); // #6c4dff
    vec3 color2 = vec3(0.27, 0.94, 0.74); // #44f1bc
    
    vec3 finalColor = mix(color1, color2, swirl * 0.5 + 0.5);
    finalColor *= orb * glow;
    
    // Add some noise/particles
    float n = fract(sin(dot(uv, vec2(12.9898, 78.233))) * 43758.5453);
    finalColor += n * 0.05 * glow;
    
    gl_FragColor = vec4(finalColor, glow * 0.8);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<script>
        // Particle System
        const container = document.getElementById('particles-container');
        const particleCount = 40;

        function createParticle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            
            p.style.left = `${startX}px`;
            p.style.top = `${startY}px`;
            
            container.appendChild(p);
            
            const duration = Math.random() * 10 + 10;
            const targetX = startX + (Math.random() - 0.5) * 200;
            const targetY = startY + (Math.random() - 0.5) * 200;

            p.animate([
                { transform: 'translate(0, 0)', opacity: 0 },
                { transform: `translate(${(Math.random() - 0.5) * 50}px, ${(Math.random() - 0.5) * 50}px)`, opacity: 0.4, offset: 0.5 },
                { transform: `translate(${targetX - startX}px, ${targetY - startY}px)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                easing: 'ease-in-out'
            });
        }

        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        // Typing Effect & Progress Tracking
        const messages = [
            "Generating sections...",
            "Building layout...",
            "Writing content...",
            "Optimizing SEO...",
            "Preparing deployment..."
        ];
        
        const typingContainer = document.getElementById('typing-container');
        const progressBar = document.getElementById('progress-bar');
        const percentageText = document.getElementById('percentage-text');
        
        let currentMsgIndex = 0;
        let currentCharIndex = 0;
        let isDeleting = false;
        let typingSpeed = 100;
        let progress = 0;

        function type() {
            const currentMessage = messages[currentMsgIndex];
            
            if (isDeleting) {
                typingContainer.textContent = currentMessage.substring(0, currentCharIndex - 1);
                currentCharIndex--;
                typingSpeed = 50;
            } else {
                typingContainer.textContent = currentMessage.substring(0, currentCharIndex + 1);
                currentCharIndex++;
                typingSpeed = 100;
            }

            if (!isDeleting && currentCharIndex === currentMessage.length) {
                isDeleting = true;
                typingSpeed = 2000; // Pause at end
            } else if (isDeleting && currentCharIndex === 0) {
                isDeleting = false;
                currentMsgIndex = (currentMsgIndex + 1) % messages.length;
                typingSpeed = 500; // Pause before next
            }

            setTimeout(type, typingSpeed);
        }

        function updateProgress() {
            if (progress < 100) {
                // Natural varying speed for progress
                const increment = Math.random() * 0.5 + 0.1;
                progress = Math.min(progress + increment, 100);
                progressBar.style.width = `${progress}%`;
                percentageText.textContent = `${Math.floor(progress)}%`;
                
                requestAnimationFrame(updateProgress);
            } else {
                percentageText.textContent = "Complete";
            }
        }

        // Init
        setTimeout(type, 1000);
        updateProgress();

        // Subtle mouse tracking for the card
        const card = document.querySelector('.glass-card');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 10;
            const y = (e.clientY / window.innerHeight - 0.5) * 10;
            card.style.transform = `perspective(1000px) rotateX(${-y}deg) rotateY(${x}deg)`;
        });
    </script>
